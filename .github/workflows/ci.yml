name: CI

on: [push, pull_request]

jobs:
  lint_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install system dependencies for pyo
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev libsndfile1-dev libportmidi-dev liblo-dev

      - name: Install dependencies
        run: pip install .[dev] pytest

      - name: Run tests
        run: pytest
